<!DOCTYPE html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
    font-family: Arial;
    background: #f0f2f5;
    text-align: center;
}

input {
    padding: 10px;
    width: 200px;
}

button {
    padding: 10px;
    margin-left: 5px;
    cursor: pointer;
}

#result {
    margin-top: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    width: 450px;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
    </style>
</head>

<body>

    <h1>Weather App</h1>

    <div class="input-group mb-3">
        <input type="text" id="cityInput" placeholder="Enter city" class="form-control"
            placeholder="Recipient's username" aria-label="Recipient's username" aria-describedby="basic-addon2">
        <span class="input-group-text" onclick="getWeather()" class="btn btn-warning">Search</span>
    </div>

    <h2 id="result"></h2>

    <script>
        document.getElementById("cityInput").addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                getWeather()
            }
        })
        async function getWeather() {
            let input = document.getElementById("cityInput").value
            document.getElementById("result").innerText = "Loading...."

            let apiKey = "a66a84f0a1efbcece43d9ee24683fdb9";
            let url = `https://api.openweathermap.org/data/2.5/weather?q=${input}&appid=${apiKey}&units=metric`;
            let res = await fetch(url)
            let data = await res.json()
            console.log(data)
            if (data.cod === '404') {
                document.getElementById("result").innerText = "City not found ❌";
                return;
            }
            document.getElementById("result").innerHTML =
                `<div class="card">
                    <h2>${data.name}</h2>
                    <p>🌡 Temp: ${data.main.temp}°C</p>
                    <p>💧 Humidity: ${data.main.humidity}%</p>
                    <p>🌥 Weather: ${data.weather[0].main}</p>
                </div>`;
        }
    </script>

</body>

</html>
