<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌤️</text></svg>">
    <title>Weather App</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #74ebd5, #9face6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .weather-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        /* .weather-container:hover {
            transform: scale(1.02);
        } */

        h1 {
            margin-bottom: 20px;
            font-weight: bold;
            color: #333;
        }

        input {
            border-top-left-radius: 30px !important;
            border-bottom-left-radius: 30px !important;
        }
        .form-control:focus{
            box-shadow: none;
        }

        .btn-search {
            border-radius: 30px;
            background: #4facfe;
            color: white;
            border: none;
            padding: 8px 20px;
            transition: 0.3s;
        }

        .btn-search:hover {
            background: #007bff;
        }

        #result {
            margin-top: 20px;
        }

        .weather-icon {
            font-size: 50px;
        }

        .temp {
            font-size: 32px;
            font-weight: bold;
        }

        .details {
            color: #555;
        }
    </style>
</head>

<body>

    <div class="weather-container">
        <h1>🌤 Weather</h1>

        <div class="input-group mb-3">
            <input type="text" id="cityInput" placeholder="Enter city..." class="form-control">
            <button class="btn-search" onclick="getWeather()">Search</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        document.getElementById("cityInput").addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                getWeather()
            }
        })

        async function getWeather() {
            let input = document.getElementById("cityInput").value
            let result = document.getElementById("result")

            result.innerHTML = "⏳ Loading..."

            let apiKey = "a66a84f0a1efbcece43d9ee24683fdb9";
            let url = `https://api.openweathermap.org/data/2.5/weather?q=${input}&appid=${apiKey}&units=metric`;

            let res = await fetch(url)
            let data = await res.json()
            // console.log(data)

            if (data.cod == '404') {
                result.innerHTML = "❌ City not found";
                return;
            }

            let iconCode = data.weather[0].icon;
            let img = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;

            let emoji = "☀️";

            if (data.weather[0].main === "Clouds") emoji = "☁️";
            if (data.weather[0].main === "Rain") emoji = "🌧";

            result.innerHTML = `
                <div>
                    <div class="weather-icon">${emoji}</div>
                    <img src="${img}" />
                    <h2>${data.name}</h2>
                    <div class="temp">${data.main.temp}°C</div>
                    <div class="details">Humidity: ${data.main.humidity}%</div>
                    <div class="details">${data.weather[0].main}</div>
                </div>
            `;
        }
    </script>

</body>

</html>
